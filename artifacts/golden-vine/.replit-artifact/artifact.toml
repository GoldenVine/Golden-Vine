kind = "web"
previewPath = "/"
title = "Golden Vine Piercing"
version = "1.0.0"
id = "artifacts/golden-vine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19528

[services.development]
run = "pnpm --filter @workspace/golden-vine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/golden-vine", "run", "build" ]
publicDir = "artifacts/golden-vine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19528"
BASE_PATH = "/"
